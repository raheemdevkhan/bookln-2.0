<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

<div class="loginbg">
  <div class="wrapper">
  <nav class="navbar navbar-expand-lg navbar-dark" >
      <div class="container-fluid">
          <a class="nav-a navbar-brand" href="#">Bookln</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                <li><a class="nav-link" href="/"><span>Home</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/indoor"><span>Indoor Courts</span></a></li>
                <li><a class="nav-link" href="/login"><span>Login</span></a></li>
                <li><a class="nav-link"  href="/signup"><span>Signup</span></a></li>
                <li class="nav-item"><a class="nav-link" aria-current="page" href="/about"><span>About Us</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/contact"><span>Contact Us</span></a></li>
              </ul>
          </div>
      </div>
  </nav>

    <div class="main">
      <div>
        <h1 class="S-head">Sign Up</h1>
      </div>
      <form action="/signup" method="POST">
        <div class="input-box">
          <section class="section2">
            <input type="text" class="input-field" name="firstname" placeholder="Firstname" autocomplete="off" required />
            <input type="text" class="input-field" name="lastname" placeholder="Lastname" autocomplete="off" required />
          </section>
        </div>
        <div class="input-box">
          <input type="text" class="input-field" name="username" placeholder="Username" autocomplete="off" required />
        </div>
        <div class="input-box">
          <input type="text" class="input-field" name="email" placeholder="Email" autocomplete="off" required />
        </div>
        <div class="input-box">
          <input type="password" class="input-field" name="password" placeholder="Password" autocomplete="off" required />
        </div>

          <div class="alr-acc-a signup-footer">
                <a  href="/login" >Already have an account? Login Now</a>
          </div>
        <div class="input-submit">
          <button class="sign-up-btn" type="submit">Sign Up!</button>
        </div>
      </form>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
