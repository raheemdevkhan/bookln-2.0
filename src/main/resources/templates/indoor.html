<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indoor Grounds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <section class="indoor-bg">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
          <a class="nav-a navbar-brand" href="#">Bookln</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li>
                <a class="nav-link" href="/"><span>Home</span></a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="/indoor"
                  ><span>Indoor Courts</span></a
                >
              </li>
              <li>
                <a class="nav-link" href="/login"><span>Login</span></a>
              </li>
              <li>
                <a class="nav-link" href="/signup"><span>Signup</span></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about"><span>About Us</span></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/contact"><span>Contact Us</span></a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container mt-4 mb-4">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <form action="/indoor" method="get" class="d-flex gap-2">
              <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search for courts (e.g. 'Power', 'Arena')..."
              />
              <button type="submit" class="btn btn-primary">Search</button>
              <div class="dropdown">
                <button
                  class="btn btn-dark dropdown-toggle"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Filter
                </button>
                <ul class="dropdown-menu">
                  <li>
                    <button
                      class="dropdown-item"
                      type="submit"
                      name="sort"
                      value="asc"
                    >
                      Ascending (A-Z)
                    </button>
                  </li>
                  <li>
                    <button
                      class="dropdown-item"
                      type="submit"
                      name="sort"
                      value="desc"
                    >
                      Descending (Z-A)
                    </button>
                  </li>
                </ul>
              </div>
              <a href="/indoor" class="btn btn-secondary">Reset</a>
            </form>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div
            th:if="${courts.length == 0}"
            class="text-center text-white mt-5"
          >
            <h3>No courts found matching your search!</h3>
            <p>Try searching for something else or click Reset.</p>
          </div>

          <div class="col-md-4 mb-4" th:each="court : ${courts}">
            >
            <div class="card" style="width: 100%">
              <img
                th:src="@{${court.imageUrl}}"
                class="card-img-top"
                th:alt="${court.name}"
                style="height: 200px; object-fit: cover"
              />

              <div class="card-body">
                <h5 class="card-title" th:text="${court.name}">Court Name</h5>

                <p class="card-text">
                  Experience the best indoor sports facility.
                </p>

                <p>
                  <i class="fa fa-map-marker"></i>
                  <span th:text="${court.location}" id="LC">Location</span>
                </p>

                <form action="/book" method="get">
                  <input type="hidden" name="court" th:value="${court.name}" />
                  <input
                    type="hidden"
                    name="number"
                    th:value="${court.number}"
                  />

                  <div class="mb-2">
                    <label class="form-label">Select Date:</label>
                    <input
                      type="date"
                      name="date"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="mb-2">
                    <label class="form-label">Select Time:</label>
                    <select name="time" class="form-select">
                      <option value="5:00 PM to 7:00 PM">
                        5:00 PM to 7:00 PM
                      </option>
                      <option value="7:00 PM to 9:00 PM">
                        7:00 PM to 9:00 PM
                      </option>
                      <option value="9:00 PM to 11:00 PM">
                        9:00 PM to 11:00 PM
                      </option>
                      <option value="11:00 PM to 1:00 AM">
                        11:00 PM to 1:00 AM
                      </option>
                    </select>
                  </div>

                  <button type="submit" class="btn btn-primary w-100 mt-2">
                    Book Now
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2025 Bookln.Co (All Rights Reserved!)</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
